<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototypes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1f1e1c;
      color: #f5f3ee;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }

    /* ---------- Home ---------- */
    #home {
      flex: 1 1 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 40px 40px;
      overflow: auto;
      transition: flex-basis 200ms ease, padding 200ms ease;
    }
    #home header {
      text-align: center;
      margin-bottom: 56px;
    }
    #home h1 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 400;
      font-size: 44px;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    #home p.sub {
      color: #9b958a;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 360px));
      gap: 20px;
      width: 100%;
      max-width: 760px;
    }
    .card {
      background: #262522;
      border: 1px solid #353330;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: border-color 120ms ease, transform 120ms ease, padding 200ms ease;
      min-height: 200px;
    }
    .card:hover { border-color: #4a4641; }
    .card .num {
      font-family: "Fraunces", Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9b958a;
    }
    .card .bet-name {
      color: #f5f3ee;
      font-family: "Fraunces", Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      padding: 4px 0;
      transition: font-size 200ms ease;
    }
    .card .actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .btn {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #4a4641;
      background: #2f2d2a;
      color: #f5f3ee;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #383532; }
    .btn.primary {
      background: #d97757;
      border-color: #d97757;
      color: #1f1e1c;
      font-weight: 500;
    }
    .btn.primary:hover { background: #c46647; border-color: #c46647; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .card .status {
      font-size: 12px;
      color: #6b6660;
    }
    .card.empty { opacity: 0.7; }

    /* ---------- Viewer ---------- */
    #viewer {
      flex: 1 1 auto;
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #1f1e1c;
      min-width: 0;
      order: 1;
    }
    body.viewing #viewer { display: flex; }
    body.viewing #home {
      flex: 0 0 300px;
      padding: 22px 18px;
      align-items: stretch;
      border-left: 1px solid #2a2825;
      background: #1a1916;
      order: 2;
    }
    body.viewing #home header {
      text-align: left;
      margin-bottom: 18px;
    }
    body.viewing #home h1 { font-size: 18px; }
    body.viewing #home p.sub { display: none; }
    body.viewing .grid {
      grid-template-columns: 1fr;
      gap: 10px;
      max-width: none;
    }
    body.viewing .card {
      padding: 14px 16px;
      min-height: 0;
      gap: 8px;
      border-radius: 12px;
    }
    body.viewing .card .num { font-size: 10px; }
    body.viewing .card .bet-name { font-size: 15px; padding: 2px 0; }
    body.viewing .card .actions { gap: 6px; }
    body.viewing .card .actions .btn { font-size: 11.5px; padding: 5px 10px; }
    body.viewing .card .status { font-size: 10.5px; }
    body.viewing .card.is-current {
      border-color: #d97757;
      background: #2a2724;
    }
    body.viewing .card.is-current .num { color: #d97757; }
    #toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #161512;
      border-bottom: 1px solid #2a2825;
      font-size: 13px;
    }
    #toolbar .label {
      flex: 1 1 auto;
      color: #9b958a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 6px;
    }
    #toolbar .label strong { color: #f5f3ee; font-weight: 500; }
    #toolbar .badge {
      background: #2a2825;
      color: #9b958a;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    #frame-wrap { flex: 1 1 auto; position: relative; background: #1f1e1c; }
    #frame { width: 100%; height: 100%; border: 0; display: block; background: #1f1e1c; }
    #frame-empty {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #6b6660; font-size: 14px; text-align: center; padding: 40px;
    }
  </style>
</head>
<body>
  <main id="home">
    <header>
      <h1>Prototypes</h1>
      <p class="sub">Monetization Take Home — Saba Munir</p>
    </header>
    <div class="grid" id="grid"></div>
  </main>

  <section id="viewer">
    <div id="toolbar">
      <button class="btn" id="btn-home" title="Back to home (Esc)">← Home</button>
      <button class="btn" id="btn-refresh" title="Refresh prototype (R)">↻ Refresh</button>
      <div class="label"><span class="badge" id="vw-num"></span> <strong id="vw-name"></strong></div>
      <button class="btn" id="btn-newtab" title="Open in new tab">↗ Open in new tab</button>
    </div>
    <div id="frame-wrap">
      <iframe id="frame" title="Prototype"></iframe>
    </div>
  </section>

  <script>
    const PROTOTYPES = [
      { id: 1, defaultName: "(Tasteful) Upgrade Awareness", file: "prototypes/prototype-1.html" },
      { id: 2, defaultName: "Value-First Sign Up", file: "prototypes/prototype-2.html" },
      { id: 3, defaultName: "Cowork on Free Tier", file: "prototypes/prototype-3.html" },
      { id: 4, defaultName: "Claude Sessions", file: "prototypes/prototype-4.html" },
    ];
    // One-time cleanup of legacy localStorage entries from when names were editable.
    try { localStorage.removeItem("prototype-names-v1"); } catch {}

    let currentId = null;

    function renderGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      PROTOTYPES.forEach(p => {
        const card = document.createElement("div");
        const isCurrent = currentId === p.id;
        card.className = "card" + (p.file ? "" : " empty") + (isCurrent ? " is-current" : "");
        let buttonHTML;
        if (!p.file) {
          buttonHTML = `<button class="btn primary" disabled>Open</button><span class="status">No file yet</span>`;
        } else if (isCurrent) {
          buttonHTML = `<button class="btn" disabled>● Viewing</button>`;
        } else {
          buttonHTML = `<button class="btn primary" data-action="open" data-id="${p.id}">${currentId ? 'Switch' : 'Open'}</button>`;
        }
        card.innerHTML = `
          <div class="num">Bet ${p.id}</div>
          <div class="bet-name" data-id="${p.id}"></div>
          <div class="actions">${buttonHTML}</div>
        `;
        card.querySelector('.bet-name').textContent = p.defaultName;
        grid.appendChild(card);
      });

      grid.querySelectorAll('[data-action="open"]').forEach(el => {
        el.addEventListener("click", () => openPrototype(+el.dataset.id));
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function openPrototype(id) {
      const p = PROTOTYPES.find(x => x.id === id);
      if (!p || !p.file) return;
      currentId = id;
      document.getElementById("vw-num").textContent = `Bet ${p.id}`;
      document.getElementById("vw-name").textContent = p.defaultName;
      document.getElementById("frame").src = p.file;
      document.body.classList.add("viewing");
      location.hash = `#p=${id}`;
      renderGrid();
    }

    function goHome() {
      currentId = null;
      document.body.classList.remove("viewing");
      document.getElementById("frame").src = "about:blank";
      if (location.hash) history.replaceState(null, "", location.pathname);
      renderGrid();
    }

    function refreshPrototype() {
      const frame = document.getElementById("frame");
      // Force reload by re-setting src
      const src = frame.getAttribute("src");
      if (!src || src === "about:blank") return;
      frame.src = "about:blank";
      requestAnimationFrame(() => { frame.src = src; });
    }

    document.getElementById("btn-home").addEventListener("click", goHome);
    document.getElementById("btn-refresh").addEventListener("click", refreshPrototype);
    document.getElementById("btn-newtab").addEventListener("click", () => {
      const src = document.getElementById("frame").getAttribute("src");
      if (src && src !== "about:blank") window.open(src, "_blank");
    });

    document.addEventListener("keydown", e => {
      if (!document.body.classList.contains("viewing")) return;
      if (e.key === "Escape") goHome();
      else if ((e.key === "r" || e.key === "R") && !e.metaKey && !e.ctrlKey && !e.altKey) {
        // avoid hijacking when typing in an input inside the iframe (we can't see it),
        // but the focused element here would be the toolbar/body, so this is safe.
        if (document.activeElement === document.body) refreshPrototype();
      }
    });

    // Restore from hash on load
    function fromHash() {
      const m = location.hash.match(/p=(\d+)/);
      if (m) openPrototype(+m[1]);
    }

    renderGrid();
    fromHash();
    window.addEventListener("hashchange", () => {
      const m = location.hash.match(/p=(\d+)/);
      if (m) openPrototype(+m[1]);
      else goHome();
    });
  </script>
</body>
</html>
