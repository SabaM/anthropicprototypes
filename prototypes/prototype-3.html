<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cowork on Free Tier — Claude desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:ital,wght@0,400;0,600;1,400&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap">

<style>
:root {
  --bg-app: #1f1e1c;
  --bg-sidebar: #1a1916;
  --bg-main: #262522;
  --bg-elev-1: #2c2b27;
  --bg-elev-2: #34322d;
  --bg-input: #2a2925;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.10);
  --text: #e9e7e0;
  --text-2: rgba(233,231,224,0.72);
  --text-3: rgba(233,231,224,0.50);
  --text-4: rgba(233,231,224,0.32);
  --accent: #d97757;
  --accent-2: #c8654a;
  --accent-soft: rgba(217,119,87,0.12);
  --accent-border: rgba(217,119,87,0.32);
  --green: #7fc89a;
  --amber: #e0b96b;
  --blue: #7aa9d9;
  --red: #e07a6e;
  --radius: 10px;
  --font-ui: 'Geist', 'Söhne', -apple-system, system-ui, sans-serif;
  --font-serif: 'Fraunces', 'Source Serif Pro', Georgia, serif;
  --font-mono: 'Geist Mono', ui-monospace, Menlo, monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#0a0908;color:var(--text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:14px}

/* ============== App layout ============== */
.app {
  display:grid;
  grid-template-columns: 240px 1fr;
  height:100vh;
  background:var(--bg-app);
  overflow:hidden;
}

/* ============== Sidebar ============== */
.cd-sidebar {
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:10px 8px;
  min-height:0;
}
.cd-sb-top { padding:8px 8px 12px; }
.cd-logo {
  display:flex;align-items:center;gap:8px;
  font-weight:600;font-size:15px;letter-spacing:-0.01em;
}
.cd-nav { display:flex;flex-direction:column;gap:1px;padding:4px 0; }
.cd-mode-toggle {
  display:flex;align-items:center;gap:4px;
  padding:4px 6px 6px;
}
.cd-mode {
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 10px;border-radius:8px;
  background:none;border:0;color:var(--text-3);
  font:inherit;font-size:13px;font-weight:500;cursor:default;
  transition:background 0.12s, color 0.12s;
}
.cd-mode:hover { color:var(--text);background:rgba(255,255,255,0.04); }
.cd-mode.is-on { background:rgba(255,255,255,0.10);color:var(--text); }
.cd-mode svg { flex-shrink:0;opacity:0.9; }
.cd-mode-pill {
  font-size:9px;font-weight:600;letter-spacing:0.08em;
  padding:2px 5px;border-radius:3px;
  background:linear-gradient(135deg, #d97757, #b45a3f);
  color:#fff;
  margin-left:2px;
}
.cd-mode-quiet {
  margin-left:auto;
  width:26px;height:26px;border-radius:6px;
  background:none;border:0;color:var(--text-4);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.cd-mode-quiet:hover { background:rgba(255,255,255,0.04);color:var(--text-2); }
.cd-nav-tag {
  font-size:9.5px;font-weight:500;letter-spacing:0.02em;
  padding:2px 6px;border-radius:4px;
  background:rgba(255,255,255,0.06);color:var(--text-3);
}
.cd-nav-item {
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:7px;
  background:none;border:0;color:var(--text-2);
  font:inherit;font-size:13px;text-align:left;cursor:default;width:100%;
  transition:background 0.12s, color 0.12s;
}
.cd-nav-item:hover { background:rgba(255,255,255,0.04);color:var(--text); }
.cd-nav-item.is-active { background:rgba(255,255,255,0.06);color:var(--text); }
.cd-nav-item svg { flex-shrink:0;opacity:0.85; }
.cd-nav-item span { flex:1; }
.cd-nav-badge {
  font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
  background:rgba(255,255,255,0.08);color:var(--text-2);
}
.cd-nav-badge.is-loud {
  background:linear-gradient(135deg, #d97757, #b45a3f);
  color:#fff;
  box-shadow:0 0 0 1px rgba(217,119,87,0.3), 0 4px 12px -3px rgba(217,119,87,0.45);
}
.cd-sb-section {
  font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-4);padding:14px 10px 6px;
}
.cd-sb-recent { flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column; }
.cd-recent {
  text-align:left;background:none;border:0;color:var(--text-2);
  font:inherit;font-size:12.5px;
  padding:6px 10px;border-radius:6px;cursor:default;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cd-recent:hover { background:rgba(255,255,255,0.03);color:var(--text); }
.cd-recent.is-active { background:rgba(255,255,255,0.06);color:var(--text); }
.cd-sb-bottom { border-top:1px solid var(--border);padding:10px 4px 4px;margin-top:8px; }
.cd-user { display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px; }
.cd-avatar {
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#5b8def,#a86bef);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:12px;color:#fff;flex-shrink:0;
}
.cd-user-meta { flex:1;min-width:0; }
.cd-user-name { font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.cd-user-plan { font-size:11px;color:var(--text-4); }
.cd-upgrade {
  font:inherit;font-size:10.5px;font-weight:500;
  padding:4px 8px;border-radius:5px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid var(--accent-border);cursor:default;
}
.cd-upgrade:hover { background:rgba(217,119,87,0.18); }

/* ============== Main pane ============== */
.cd-main {
  display:flex;flex-direction:column;
  background:var(--bg-main);
  min-height:0;min-width:0;
  position:relative;
}

/* ============== Top bar ============== */
.cd-topbar {
  height:42px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:1px solid var(--border);
}
.cd-tb-left, .cd-tb-right { display:flex;align-items:center;gap:6px; }
.cd-iconbtn {
  width:28px;height:28px;border-radius:6px;
  background:none;border:0;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.cd-iconbtn:hover { background:rgba(255,255,255,0.05);color:var(--text); }
.cd-breadcrumb { font-size:12.5px;color:var(--text-2);margin-left:4px; }

/* ============== Conversation ============== */
.cd-content {
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.conversation { max-width:760px;width:100%;margin:0 auto;padding:32px 32px 80px;display:flex;flex-direction:column;gap:24px; }

.msg { display:flex;width:100%; }
.msg-user { justify-content:flex-end; }
.msg-user-bubble {
  max-width:85%;
  padding:14px 18px;border-radius:16px;
  background:#34322d;
  font-size:14.5px;line-height:1.55;
  color:var(--text);
}

.msg-claude { gap:14px;align-items:flex-start; }
.msg-claude-mark {
  width:24px;height:24px;border-radius:6px;flex-shrink:0;margin-top:4px;
  background:rgba(217,119,87,0.10);
  display:flex;align-items:center;justify-content:center;
}
.msg-claude-body { flex:1;min-width:0; }

/* ============== Connector row ============== */
.connector-row {
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:7px 10px;border-radius:8px;
  background:rgba(255,255,255,0.03);
  margin-bottom:18px;
  font-size:12px;color:var(--text-3);
}
.connector-row-label { font-size:11.5px;color:var(--text-4);margin-right:4px; }
.connector-row-meta { color:var(--text-4);font-size:11.5px;margin-left:2px; }

.src-chip {
  display:inline-flex;align-items:center;gap:5px;
  padding:2.5px 7px 2.5px 5px;
  border-radius:5px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  font-size:11px;font-weight:500;color:var(--text-2);
  white-space:nowrap;
  vertical-align:baseline;
}
.src-chip-ico { display:flex;align-items:center; }

/* ============== Todo response ============== */
.todo-response { font-size:14.5px;line-height:1.6;color:var(--text); }
.todo-response p { margin:0 0 16px;color:var(--text); }
.todo-response strong { color:var(--text);font-weight:600; }
.todo-response em { font-style:italic; }

.todo-h {
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-ui);
  font-size:16px;font-weight:600;
  margin:24px 0 4px;letter-spacing:-0.01em;
}
.todo-dot {
  width:11px;height:11px;border-radius:50%;
  display:inline-block;flex-shrink:0;
}
.todo-dot-red { background:#e07a6e;box-shadow:inset 0 0 0 2px rgba(0,0,0,0.15); }
.todo-dot-amber { background:#e0b96b;box-shadow:inset 0 0 0 2px rgba(0,0,0,0.15); }
.todo-dot-blue { background:#7aa9d9;box-shadow:inset 0 0 0 2px rgba(0,0,0,0.15); }

.todo-sub {
  font-size:13.5px;color:var(--text-2);font-weight:500;
  margin:8px 0 6px !important;
}
.todo-list { list-style:none;padding:0;margin:0 0 8px;display:flex;flex-direction:column;gap:10px; }
.todo-item {
  position:relative;
  padding-left:18px;
  font-size:14px;line-height:1.55;
}
.todo-item::before {
  content:'';
  position:absolute;
  left:4px;top:9px;width:5px;height:5px;border-radius:50%;
  background:var(--text-3);
}
.todo-item.is-dim { color:var(--text-3); }
.todo-item.is-dim::before { background:var(--text-4); }
.todo-item-text { display:inline; }
.todo-item-srcs {
  display:inline-flex;gap:4px;margin-left:8px;
  vertical-align:middle;position:relative;top:-1px;
}

/* ============== Upsell variants ============== */
.upsell { margin-top:24px; }

/* Chip variant */
.upsell-chip {
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.upsell-chip-btn {
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px 8px 12px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(217,119,87,0.14), rgba(217,119,87,0.08));
  border:1px solid var(--accent-border);
  color:var(--text);font:inherit;font-size:13px;font-weight:500;
  cursor:default;
  transition:transform 0.12s, background 0.12s;
}
.upsell-chip-btn:hover { background:linear-gradient(180deg, rgba(217,119,87,0.22), rgba(217,119,87,0.12));transform:translateY(-0.5px); }
.upsell-chip-btn svg { color:var(--accent); }
.upsell-chip-arrow { color:var(--accent);font-size:14px;margin-left:2px; }
.upsell-free-tag {
  font-size:10.5px;letter-spacing:0.04em;
  padding:3px 8px;border-radius:4px;
  background:rgba(255,255,255,0.06);
  color:var(--text-3);
  text-transform:lowercase;font-weight:500;
}
.upsell-free-tag.is-loud {
  background:linear-gradient(135deg,#d97757,#b45a3f);
  color:#fff;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;font-size:10px;
  box-shadow:0 0 0 1px rgba(217,119,87,0.3), 0 6px 16px -3px rgba(217,119,87,0.4);
}

/* Card variant */
.upsell-card {
  border-radius:12px;
  background:linear-gradient(180deg, rgba(217,119,87,0.06), rgba(217,119,87,0.02));
  border:1px solid var(--accent-border);
  padding:16px 18px;
}
.upsell-card-head { display:flex;align-items:flex-start;gap:12px;margin-bottom:14px; }
.upsell-card-icon {
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:rgba(217,119,87,0.12);
  display:flex;align-items:center;justify-content:center;
}
.upsell-card-titles { flex:1;min-width:0; }
.upsell-card-title { font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px; }
.upsell-card-sub { font-size:12.5px;color:var(--text-2);line-height:1.5; }
.upsell-card-badge {
  flex-shrink:0;
  font-size:11px;font-weight:500;
  padding:4px 9px;border-radius:5px;
  background:rgba(255,255,255,0.06);
  color:var(--text-2);
}
.upsell-card-badge.is-loud {
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#d97757,#b45a3f);
  color:#fff;padding:6px 11px;
  box-shadow:0 0 0 1px rgba(217,119,87,0.3), 0 8px 20px -4px rgba(217,119,87,0.4);
}
.upsell-card-badge-star { font-size:14px; }
.upsell-card-badge-l1 { font-size:11px;font-weight:700;letter-spacing:0.07em;line-height:1.1; }
.upsell-card-badge-l2 { font-size:9.5px;opacity:0.85;line-height:1.1;font-weight:500; }

.upsell-card-row {
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  flex-wrap:wrap;
}
.upsell-card-meta { display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--text-3);font-size:11.5px; }
.upsell-meta-item { display:inline-flex;align-items:center;gap:5px; }
.upsell-meta-item svg { opacity:0.8; }
.upsell-card-cta {
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:7px;
  background:var(--accent);color:#fff;
  border:0;font:inherit;font-size:12.5px;font-weight:500;
  cursor:default;
  box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 12px -3px rgba(217,119,87,0.5);
}
.upsell-card-cta:hover { background:#cf6b48; }

/* Banner variant */
.upsell-banner {
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
  border-radius:8px;
  background:rgba(217,119,87,0.06);
  border:1px solid var(--accent-border);
  font-size:13px;
}
.upsell-banner-icon {
  width:24px;height:24px;border-radius:6px;
  background:rgba(217,119,87,0.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.upsell-banner-text { flex:1;color:var(--text-2); }
.upsell-banner-text strong { color:var(--text); }
.upsell-banner-pill {
  margin-left:8px;
  font-size:10.5px;font-weight:500;
  padding:2px 7px;border-radius:4px;
  background:rgba(255,255,255,0.06);
  color:var(--text-3);
  text-transform:lowercase;
}
.upsell-banner-pill.is-loud {
  background:linear-gradient(135deg,#d97757,#b45a3f);
  color:#fff;text-transform:uppercase;font-weight:600;letter-spacing:0.05em;font-size:10px;
}
.upsell-banner-cta {
  font:inherit;font-size:12.5px;font-weight:500;color:var(--accent);
  background:none;border:0;cursor:default;
  padding:4px 8px;border-radius:5px;
}
.upsell-banner-cta:hover { background:rgba(217,119,87,0.1); }

/* ============== Composer ============== */
.composer-wrap {
  position:sticky;bottom:0;
  padding:0 32px 16px;background:linear-gradient(180deg, rgba(38,37,34,0) 0%, var(--bg-main) 30%);
  max-width:760px;width:100%;margin:0 auto;
}
.composer {
  background:var(--bg-input);border:1px solid var(--border-strong);
  border-radius:14px;padding:8px 8px 6px 14px;
}
.composer-textarea { padding:10px 4px;color:var(--text-4);font-size:14px;min-height:44px; }
.composer-row { display:flex;align-items:center;justify-content:space-between;gap:8px; }
.composer-tools { display:flex;align-items:center;gap:4px; }
.composer-tool {
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 8px;border-radius:6px;
  background:none;border:0;color:var(--text-3);font:inherit;font-size:12px;cursor:default;
}
.composer-tool:hover { background:rgba(255,255,255,0.05);color:var(--text); }
.composer-send {
  width:30px;height:30px;border-radius:8px;
  background:#3a3934;border:0;color:var(--text-4);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.composer-foot { text-align:center;font-size:11px;color:var(--text-4);padding:8px 0 0; }

/* ============== Setup modal ============== */
.setup-overlay {
  position:absolute;inset:0;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;
  z-index:50;
  animation:fadein 0.2s;
}
.setup-modal {
  width:540px;max-width:calc(100% - 32px);
  max-height:calc(100vh - 64px);
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideup 0.25s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes fadein { from{opacity:0} to{opacity:1} }
@keyframes slideup { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

.setup-panel-overlay {
  position:absolute;inset:0;
  background:rgba(0,0,0,0.4);
  display:flex;justify-content:flex-end;
  z-index:50;animation:fadein 0.2s;
}
.setup-panel {
  width:480px;max-width:90%;height:100%;
  background:var(--bg-elev-1);border-left:1px solid var(--border-strong);
  display:flex;flex-direction:column;overflow:hidden;
  animation:slidein 0.25s cubic-bezier(0.2,0.8,0.2,1);
  box-shadow:-12px 0 60px rgba(0,0,0,0.4);
}
@keyframes slidein { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }

.setup-head {
  display:flex;align-items:flex-start;gap:12px;
  padding:18px 20px 14px;border-bottom:1px solid var(--border);position:relative;
}
.setup-head-icon {
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:rgba(217,119,87,0.12);
  display:flex;align-items:center;justify-content:center;
}
.setup-title { font-size:15px;font-weight:600; }
.setup-sub { font-size:12.5px;color:var(--text-3);margin-top:2px;line-height:1.4;max-width:380px; }
.setup-x {
  position:absolute;top:12px;right:12px;
  width:26px;height:26px;border-radius:6px;
  background:none;border:0;color:var(--text-3);font-size:18px;line-height:1;cursor:default;
}
.setup-x:hover { background:rgba(255,255,255,0.06);color:var(--text); }

.setup-body { padding:18px 20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:18px; }
.setup-field { display:flex;flex-direction:column;gap:6px; }
.setup-field label {
  font-size:11px;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--text-3);font-weight:500;
}
.setup-input {
  background:var(--bg-input);border:1px solid var(--border-strong);
  border-radius:7px;padding:8px 10px;color:var(--text);
  font:inherit;font-size:13px;outline:none;
}
.setup-input:focus { border-color:var(--accent-border); }

.setup-prompt {
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:7px;padding:11px 12px;
  font-size:12.5px;color:var(--text-2);line-height:1.55;
  position:relative;
}
.setup-prompt-tag {
  display:inline-block;
  font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;
  background:var(--accent-soft);color:var(--accent);
  margin-bottom:8px;font-weight:600;
}

.setup-sources { display:flex;flex-direction:column;gap:6px; }
.setup-source {
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:6px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
}
.setup-source-status { flex:1;font-size:11.5px;color:var(--text-3); }

.setup-grid { display:grid;grid-template-columns:1.4fr 1fr;gap:14px; }

.setup-radio-group { display:flex;gap:4px;background:var(--bg-input);padding:3px;border-radius:8px;border:1px solid var(--border-strong); }
.setup-radio {
  flex:1;
  padding:6px 10px;border-radius:5px;
  background:none;border:0;color:var(--text-3);
  font:inherit;font-size:12px;cursor:default;
  transition:background 0.12s, color 0.12s;
}
.setup-radio:hover { color:var(--text); }
.setup-radio.is-on { background:rgba(255,255,255,0.08);color:var(--text); }

.setup-dest { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px; }
.setup-dest-opt {
  display:flex;align-items:center;gap:10px;
  padding:10px 11px;border-radius:8px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  color:var(--text);font:inherit;text-align:left;cursor:default;
  position:relative;
}
.setup-dest-opt.is-on { border-color:var(--accent-border);background:var(--accent-soft); }
.setup-dest-opt.is-disabled { opacity:0.5; }
.setup-dest-icon {
  width:24px;height:24px;border-radius:6px;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.setup-dest-l1 { font-size:12.5px;font-weight:500; }
.setup-dest-l2 { font-size:10.5px;color:var(--text-3);margin-top:1px; }
.setup-dest-check { position:absolute;top:7px;right:9px;color:var(--accent);font-size:13px; }

.setup-quota {
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:8px;padding:11px 12px;
}
.setup-quota-bar {
  height:4px;border-radius:2px;background:rgba(255,255,255,0.08);
  overflow:hidden;margin-bottom:8px;
}
.setup-quota-fill {
  height:100%;background:linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius:2px;
}
.setup-quota-text { font-size:11.5px;color:var(--text-2); }
.setup-quota-text strong { color:var(--text); }
.setup-quota-text a { color:var(--accent);text-decoration:none; }

.setup-foot {
  display:flex;justify-content:flex-end;gap:8px;
  padding:12px 20px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.15);
}
.setup-secondary, .setup-primary {
  padding:7px 14px;border-radius:7px;font:inherit;font-size:12.5px;font-weight:500;cursor:default;
}
.setup-secondary { background:none;border:1px solid var(--border-strong);color:var(--text-2); }
.setup-secondary:hover { background:rgba(255,255,255,0.04);color:var(--text); }
.setup-primary {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);border:0;color:#fff;
  box-shadow:0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 12px -3px rgba(217,119,87,0.5);
}
.setup-primary:hover { background:#cf6b48; }

/* ============== Task modal (mirrors real "Create scheduled task") ============== */
.task-modal {
  width:620px;max-width:calc(100% - 32px);
  max-height:calc(100vh - 64px);
  background:var(--bg-elev-1);
  border:1px solid var(--border-strong);
  border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideup 0.2s cubic-bezier(0.2,0.8,0.2,1);
}
.task-modal-head {
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;
}
.task-modal-title { font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.01em; }
.task-modal-x {
  width:28px;height:28px;border-radius:7px;
  background:none;border:0;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.task-modal-x:hover { background:rgba(255,255,255,0.05);color:var(--text); }

.task-modal-body {
  padding:0 22px 8px;flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:16px;
}
.task-field { display:flex;flex-direction:column;gap:6px; }
.task-field-narrow { max-width:200px; }
.task-label {
  font-size:12.5px;font-weight:500;color:var(--text);
  letter-spacing:0;
}
.task-req { color:var(--accent);font-weight:500; }
.task-input {
  background:var(--bg-input);
  border:1px solid var(--border-strong);
  border-radius:8px;padding:9px 12px;color:var(--text);
  font:inherit;font-size:13.5px;outline:none;
  transition:border-color 0.12s;
}
.task-input::placeholder { color:var(--text-4); }
.task-input:focus { border-color:var(--accent-border); }

.task-prompt-shell {
  background:var(--bg-input);
  border:1px solid var(--border-strong);
  border-radius:10px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.task-prompt-textarea {
  background:none;border:0;outline:none;resize:none;
  color:var(--text);
  font:inherit;font-size:13.5px;line-height:1.55;
  padding:12px 14px 8px;
  min-height:108px;
}
.task-prompt-textarea::placeholder { color:var(--text-4); }
.task-prompt-foot {
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px 8px;
}
.task-prompt-foot-l { display:flex;gap:2px; }
.task-chip {
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 9px;border-radius:7px;
  background:none;border:0;color:var(--text-2);
  font:inherit;font-size:12.5px;cursor:default;
  transition:background 0.12s, color 0.12s;
}
.task-chip:hover { background:rgba(255,255,255,0.04);color:var(--text); }
.task-chip svg { opacity:0.85; }
.task-chip-quiet { color:var(--text-3); }

.task-select-wrap { position:relative;display:inline-block; }
.task-select {
  background:var(--bg-input);
  border:1px solid var(--border-strong);
  border-radius:8px;padding:8px 30px 8px 12px;
  color:var(--text);font:inherit;font-size:13px;
  outline:none;cursor:default;
  appearance:none;-webkit-appearance:none;
  width:100%;
}
.task-select:focus { border-color:var(--accent-border); }
.task-select-caret {
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  color:var(--text-3);pointer-events:none;
}

.task-modal-foot {
  display:flex;justify-content:flex-end;gap:8px;
  padding:14px 22px 18px;
}
.task-btn {
  padding:8px 18px;border-radius:8px;
  font:inherit;font-size:13px;font-weight:500;
  cursor:default;border:0;
  transition:background 0.12s;
}
.task-btn-secondary {
  background:none;border:1px solid var(--border-strong);
  color:var(--text);
}
.task-btn-secondary:hover { background:rgba(255,255,255,0.04); }
.task-btn-primary {
  background:var(--accent);color:#fff;
  box-shadow:0 1px 0 rgba(255,255,255,0.15) inset;
}
.task-btn-primary:hover { background:#cf6b48; }
.task-btn-primary.is-disabled {
  background:rgba(255,255,255,0.10);
  color:var(--text-3);
  box-shadow:none;
}
.task-btn-primary.is-disabled:hover { background:rgba(255,255,255,0.10); }

/* ============== Upsell quota badge ============== */
.upsell-card-actions {
  display:flex;align-items:center;gap:14px;
  margin-left:auto;
}
.upsell-quota-badge {
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;color:var(--text-3);
  white-space:nowrap;
}
.upsell-quota-badge strong { color:var(--text-2);font-weight:600; }
.upsell-quota-badge.is-loud {
  padding:5px 10px;border-radius:6px;
  background:rgba(217,119,87,0.12);
  border:1px solid var(--accent-border);
  color:var(--accent);
  font-size:11px;font-weight:500;letter-spacing:0.02em;
}
.upsell-quota-badge.is-loud strong { color:var(--accent);font-weight:600; }
.upsell-quota-star { color:var(--accent); }

/* ============== Chat-style setup ============== */
.chat-setup {
  position:absolute;left:50%;bottom:90px;transform:translateX(-50%);
  width:560px;max-width:calc(100% - 64px);
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  border-radius:14px;
  box-shadow:0 16px 60px rgba(0,0,0,0.5);
  z-index:30;
  animation:slideup 0.25s cubic-bezier(0.2,0.8,0.2,1);
}
.chat-setup-head {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;border-bottom:1px solid var(--border);
}
.chat-setup-head-l { display:flex;align-items:center;gap:10px; }
.chat-setup-title { font-size:13.5px;font-weight:600; }
.chat-setup-sub { font-size:11px;color:var(--text-3);margin-top:1px; }
.chat-setup-body { padding:16px; }
.chat-setup-msg { font-size:13.5px;line-height:1.55;color:var(--text);margin-bottom:14px; }
.chat-setup-msg strong { color:var(--text);font-weight:600; }
.chat-setup-msg em { font-style:italic;color:var(--text-2); }
.chat-setup-options { display:flex;flex-direction:column;gap:6px; }
.chat-setup-opt {
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 14px;border-radius:8px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  color:var(--text);font:inherit;font-size:13px;text-align:left;cursor:default;
  transition:background 0.12s, border-color 0.12s, transform 0.12s;
}
.chat-setup-opt:not(.is-disabled):hover {
  background:rgba(217,119,87,0.06);border-color:var(--accent-border);
  transform:translateX(2px);
}
.chat-setup-opt.is-disabled { opacity:0.4; }
.chat-setup-opt-arrow { color:var(--accent);font-size:14px; }

/* ============== Cowork tab ============== */
.cw-tab { max-width:920px;margin:0 auto;padding:32px 32px 80px;width:100%; }
.cw-tab-head {
  display:grid;grid-template-columns:1fr auto;gap:32px;
  margin-bottom:36px;align-items:flex-start;
}
.cw-tab-titles {}
.cw-tab-eyebrow {
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--text-3);
  margin-bottom:14px;
}
.cw-tab-eyebrow-dot {
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 3px rgba(217,119,87,0.18);
}
.cw-tab-eyebrow-pill {
  font-size:9.5px;letter-spacing:0.05em;font-weight:600;
  padding:2px 7px;border-radius:4px;
  background:rgba(255,255,255,0.06);color:var(--text-2);
}
.cw-tab-eyebrow-pill.is-loud {
  background:linear-gradient(135deg,#d97757,#b45a3f);color:#fff;
  box-shadow:0 0 0 1px rgba(217,119,87,0.3), 0 4px 12px -3px rgba(217,119,87,0.4);
}
.cw-tab-h1 {
  font-family:var(--font-serif);font-weight:500;
  font-size:36px;line-height:1.1;letter-spacing:-0.02em;
  margin:0 0 12px;color:var(--text);
}
.cw-tab-lead {
  font-size:14.5px;line-height:1.55;color:var(--text-2);
  max-width:560px;margin:0;
}
.cw-tab-quota {
  background:linear-gradient(180deg, rgba(217,119,87,0.08), rgba(217,119,87,0.02));
  border:1px solid var(--accent-border);
  border-radius:12px;padding:16px 18px;
  min-width:200px;
}
.cw-tab-quota-num {
  display:flex;align-items:baseline;gap:2px;
  font-family:var(--font-serif);
  margin-bottom:2px;
}
.cw-tab-quota-used {
  font-size:36px;font-weight:500;color:var(--accent);line-height:1;
}
.cw-tab-quota-total { font-size:18px;color:var(--text-3); }
.cw-tab-quota-label { font-size:11px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px; }
.cw-tab-quota-bar { height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:8px; }
.cw-tab-quota-fill { height:100%;background:linear-gradient(90deg, var(--accent), var(--accent-2));border-radius:2px;transition:width 0.5s; }
.cw-tab-upgrade-link { font-size:11.5px;color:var(--accent);text-decoration:none; }

.cw-tab-section { margin-bottom:36px; }
.cw-tab-section-head {
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--border);
}
.cw-tab-section-head h2 {
  font-family:var(--font-ui);
  font-size:13px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
  margin:0;color:var(--text-2);
}
.cw-tab-section-count { font-size:12px;color:var(--text-4);font-variant-numeric:tabular-nums; }
.cw-tab-section-locked { font-size:11px;color:var(--text-4);margin-left:auto; }

/* ============== Cowork landing (composer-first) ============== */
.cw-land {
  position:relative;
  flex:1;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  min-height:100%;
  padding:64px 32px 80px;
  overflow:hidden;
}
.cw-land-bg {
  position:absolute;inset:0;
  background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 18px 18px;
  -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 40%, #000 30%, transparent 90%);
          mask-image: radial-gradient(ellipse 90% 80% at 50% 40%, #000 30%, transparent 90%);
  pointer-events:none;
}
.cw-land-inner {
  position:relative;z-index:1;
  width:100%;max-width:760px;
  display:flex;flex-direction:column;gap:18px;
}
.cw-land-hero {
  margin-bottom:6px;padding-left:2px;
}
.cw-land-mark {
  margin-bottom:10px;
}
.cw-land-title-row { display:flex;align-items:flex-start;gap:14px; }
.cw-land-title {
  font-family:var(--font-serif);font-weight:500;
  font-size:34px;line-height:1.1;letter-spacing:-0.022em;
  margin:0 0 8px;color:var(--text);
}
.cw-land-mark {
  display:inline-flex;align-items:center;justify-content:center;
  vertical-align:middle;margin-right:14px;
}
.cw-land-link {
  font-size:13px;color:var(--text-3);text-decoration:underline;
  text-underline-offset:3px;text-decoration-color:rgba(233,231,224,0.25);
  display:inline-block;margin-top:4px;
}
.cw-land-link:hover { color:var(--text-2); }

.cw-land-composer-wrap {
  position:relative;
  display:flex;flex-direction:column;gap:8px;
  border-radius:18px;
}
.cw-land-composer-wrap.is-glow {
  padding:0;
  box-shadow: 0 0 0 1px rgba(217,119,87,0.35), 0 0 36px -8px rgba(217,119,87,0.5);
}
.cw-land-composer-wrap.is-glow .cw-land-composer {
  border-color:rgba(217,119,87,0.3);
}
.cw-land-composer {
  background:rgba(42,41,37,0.7);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:14px 16px 10px;
  box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 12px 40px -16px rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
}
.cw-land-composer-input {
  font-size:14.5px;color:var(--text-4);
  padding:10px 4px 28px 14px;
  position:relative;
}
.cw-land-composer-input::before {
  content:'';
  position:absolute;left:4px;top:8px;
  width:1.5px;height:18px;
  background:var(--text-2);
  animation: cwCaret 1s step-end infinite;
}
@keyframes cwCaret { 50% { opacity:0; } }
.cw-land-composer-row {
  display:flex;align-items:center;gap:6px;
  padding:4px 0 2px;
}
.cw-land-icon-btn {
  width:32px;height:32px;border-radius:8px;
  background:none;border:0;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.cw-land-icon-btn:hover { background:rgba(255,255,255,0.05);color:var(--text); }
.cw-land-spacer { flex:1; }

.cw-land-send-cta {
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;
  background:var(--accent);color:#fff;
  border:0;font:inherit;font-size:12.5px;font-weight:600;cursor:default;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 14px -4px rgba(217,119,87,0.5);
}
.cw-land-send-cta:hover { background:#cf6b48; }

.cw-land-toolbar {
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:0 4px;
}
.cw-land-toolbar-spacer { flex:1; }
.cw-land-pill {
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:8px;
  background:none;border:0;color:var(--text-2);
  font:inherit;font-size:12.5px;font-weight:500;cursor:default;
  white-space:nowrap;
  transition:background 0.12s, color 0.12s;
}
.cw-land-pill:hover { background:rgba(255,255,255,0.05);color:var(--text); }
.cw-land-pill svg { opacity:0.85; }
.cw-land-pill-quiet { color:var(--text-3); }

/* ---- Untried treatments ---- */

/* Pill in the toolbar */
.cw-tx-pill {
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:8px;
  background:rgba(217,119,87,0.10);
  border:1px solid var(--accent-border);
  color:var(--text-2);font-size:12px;
  white-space:nowrap;
}
.cw-tx-pill strong { color:var(--accent);font-weight:600; }
.cw-tx-pill-spark { color:var(--accent);font-size:11px; }

/* Banner above composer */
.cw-tx-banner {
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:rgba(217,119,87,0.07);
  border:1px solid var(--accent-border);
  font-size:13px;color:var(--text-2);
}
.cw-tx-banner.is-warn {
  background:linear-gradient(180deg, rgba(217,119,87,0.12), rgba(217,119,87,0.05));
}
.cw-tx-banner-icon {
  width:24px;height:24px;border-radius:6px;
  background:rgba(217,119,87,0.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cw-tx-banner-icon.is-warn { background:rgba(217,119,87,0.18); }
.cw-tx-banner-text { flex:1;line-height:1.45; }
.cw-tx-banner-text strong { color:var(--text);font-weight:600; }
.cw-tx-banner-link {
  font-size:12px;color:var(--accent);text-decoration:none;font-weight:500;
  padding:4px 8px;border-radius:5px;white-space:nowrap;
}
.cw-tx-banner-link:hover { background:rgba(217,119,87,0.10); }
.cw-tx-banner-cta {
  font:inherit;font-size:12.5px;font-weight:600;
  padding:6px 14px;border-radius:7px;
  background:var(--accent);border:0;color:#fff;cursor:default;
  white-space:nowrap;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset;
}
.cw-tx-banner-cta:hover { background:#cf6b48; }

/* Tooltip floating beside composer */
.cw-tx-tooltip {
  position:absolute;
  bottom:62px;right:-12px;
  transform:translateX(100%);
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-radius:10px;
  background:linear-gradient(180deg, #d97757, #b45a3f);
  color:#fff;
  width:240px;
  box-shadow:0 12px 32px -8px rgba(217,119,87,0.5);
  animation: cwTipBob 2.4s ease-in-out infinite;
}
@keyframes cwTipBob {
  0%, 100% { transform:translateX(100%) translateY(0); }
  50%      { transform:translateX(100%) translateY(-3px); }
}
.cw-tx-tooltip-arrow {
  position:absolute;left:-6px;top:24px;
  width:12px;height:12px;
  background:#d97757;
  transform:rotate(45deg);
}
.cw-tx-tooltip-spark { font-size:14px;flex-shrink:0;margin-top:1px; }
.cw-tx-tooltip-title { font-size:12.5px;font-weight:600;margin-bottom:2px; }
.cw-tx-tooltip-sub { font-size:11.5px;color:rgba(255,255,255,0.85);line-height:1.4; }

/* ---- Used-state overlay (locks composer) ---- */
.cw-tx-overlay {
  position:absolute;inset:0;
  border-radius:18px;
  background:rgba(20,19,17,0.55);
  backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;
  z-index:5;
}
.cw-tx-overlay-card {
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:12px;
  background:var(--bg-elev-1);
  border:1px solid var(--accent-border);
  box-shadow:0 12px 40px -8px rgba(0,0,0,0.5);
  max-width:520px;
}
.cw-tx-overlay-icon {
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:rgba(217,119,87,0.12);
  display:flex;align-items:center;justify-content:center;
}
.cw-tx-overlay-text { flex:1; }
.cw-tx-overlay-title { font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px; }
.cw-tx-overlay-sub { font-size:12.5px;color:var(--text-2);line-height:1.5; }
.cw-tx-overlay-cta {
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  background:var(--accent);color:#fff;
  border:0;font:inherit;font-size:12.5px;font-weight:600;cursor:default;
  white-space:nowrap;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 14px -4px rgba(217,119,87,0.5);
}
.cw-tx-overlay-cta:hover { background:#cf6b48; }
.cw-land-composer-wrap.is-locked .cw-land-composer { opacity:0.55; }

/* ---- Used-state card-below ---- */
.cw-tx-card {
  border-radius:14px;
  background:linear-gradient(180deg, rgba(217,119,87,0.10), rgba(217,119,87,0.04));
  border:1px solid var(--accent-border);
  padding:18px 20px;
  display:flex;flex-direction:column;gap:16px;
}
.cw-tx-card-row { display:flex;align-items:center;gap:14px; }
.cw-tx-card-icon {
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:rgba(217,119,87,0.12);
  display:flex;align-items:center;justify-content:center;
}
.cw-tx-card-titles { flex:1; }
.cw-tx-card-title { font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:3px; }
.cw-tx-card-sub { font-size:12.5px;color:var(--text-2);line-height:1.5; }
.cw-tx-card-cta {
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  background:var(--accent);color:#fff;
  border:0;font:inherit;font-size:12.5px;font-weight:600;cursor:default;
  white-space:nowrap;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 14px -4px rgba(217,119,87,0.5);
}
.cw-tx-card-cta:hover { background:#cf6b48; }
.cw-tx-card-examples {
  display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;
}
.cw-tx-card-ex {
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
}
.cw-tx-card-ex-cad {
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:4px;
}
.cw-tx-card-ex-title { font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3; }

/* ---- Active-task section under composer ---- */
.cw-land-active-section {
  margin-top:24px;
}
.cw-land-active-head {
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:12px;padding:0 4px 10px;
  border-bottom:1px solid var(--border);
}
.cw-land-active-eyebrow {
  font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-2);
}
.cw-land-active-id {
  font-family:var(--font-mono);font-size:10.5px;
  color:var(--text-4);
  padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);
}

/* Empty state (legacy) */
.cw-empty {
  text-align:center;padding:48px 32px;
  border:1px dashed var(--border-strong);border-radius:12px;
  background:rgba(255,255,255,0.01);
}
.cw-empty-icon { display:flex;justify-content:center;margin-bottom:10px; }
.cw-empty-title { font-size:15px;font-weight:600;margin-bottom:4px; }
.cw-empty-sub { font-size:13px;color:var(--text-3);max-width:420px;margin:0 auto;line-height:1.5; }
.cw-empty-sub strong { color:var(--text-2);font-weight:600; }
.cw-empty-cta { margin-top:20px; }
.cw-empty-btn {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);color:#1f1e1c;border:none;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:background 120ms ease;
}
.cw-empty-btn:hover { background:var(--accent-2); }

/* ---------- v2: sidebar Chat-icon nudge dot ---------- */
.cd-mode-icon-wrap { position:relative;display:inline-flex;align-items:center;justify-content:center; }
.cd-mode-nudge-dot {
  position:absolute;top:-7px;right:-9px;
  width:12px;height:12px;border-radius:50%;
  background:#7fc89a;
  box-shadow:
    0 0 0 2px rgba(127,200,154,0.35),
    0 0 0 0 rgba(127,200,154,0.85);
  animation:cwPulse 1.1s ease-out infinite;
  pointer-events:none;
  z-index:2;
}
@keyframes cwPulse {
  0% {
    box-shadow:
      0 0 0 2px rgba(127,200,154,0.35),
      0 0 0 0 rgba(127,200,154,0.85);
    transform:scale(1);
  }
  70% {
    box-shadow:
      0 0 0 2px rgba(127,200,154,0),
      0 0 0 16px rgba(127,200,154,0);
    transform:scale(1.1);
  }
  100% {
    box-shadow:
      0 0 0 2px rgba(127,200,154,0),
      0 0 0 0 rgba(127,200,154,0);
    transform:scale(1);
  }
}

/* ---------- v2: quota locked tint ---------- */
.cw-tab-quota.is-locked .cw-tab-quota-fill {
  background:linear-gradient(90deg, #e89164, #d97757);
}

/* ---------- v2: top bar Reset button ---------- */
.cd-reset-btn {
  display:inline-flex;align-items:center;gap:5px;
  background:transparent;border:1px solid var(--border-strong);
  color:var(--text-2);font-size:12px;font-family:inherit;
  padding:5px 10px;border-radius:6px;cursor:pointer;margin-right:6px;
  transition:background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.cd-reset-btn:hover { background:rgba(255,255,255,0.04);color:var(--text);border-color:var(--text-3); }

/* ---------- v2: task list ---------- */
.cw-task-list { display:flex;flex-direction:column;gap:10px; }
.cw-task-row {
  background:var(--bg-elev-1);
  border:1px solid var(--border-strong);
  border-radius:12px;
  padding:14px 16px;
  animation:cwTaskIn 280ms ease;
}
@keyframes cwTaskIn {
  from { opacity:0;transform:translateY(6px); }
  to   { opacity:1;transform:translateY(0); }
}
.cw-task-row.is-running { border-color:rgba(217,119,87,0.4);background:rgba(217,119,87,0.04); }
.cw-task-row.is-locked  { opacity:0.92; }
.cw-task-row-head { display:flex;align-items:center;justify-content:space-between;gap:14px; }
.cw-task-row-l { display:flex;align-items:center;gap:11px;min-width:0;flex:1; }
.cw-task-row-r { display:flex;align-items:center;gap:6px;flex-shrink:0; }
.cw-task-row-spin {
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(217,119,87,0.18);border-top-color:var(--accent);
  animation:cwSpin 0.9s linear infinite;flex-shrink:0;
}
@keyframes cwSpin { to { transform:rotate(360deg); } }
.cw-task-row-check { display:flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0; }
.cw-task-row-titles { display:flex;flex-direction:column;gap:2px;min-width:0; }
.cw-task-row-title {
  font-size:13.5px;font-weight:500;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:540px;
}
.cw-task-row-status { font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:6px; }
.cw-task-row-dot { width:6px;height:6px;border-radius:50%;display:inline-block; }
.cw-task-row-dot.is-running { background:var(--accent);animation:cwBlink 1.2s ease-in-out infinite; }
.cw-task-row-dot.is-done    { background:#7fc89a; }
@keyframes cwBlink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.cw-task-row-lock { color:var(--text-4);display:flex;align-items:center;margin-left:4px; }
.cw-connector {
  font-size:10.5px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;
  padding:3px 7px;border-radius:4px;border:1px solid currentColor;
}

/* ---------- v2: cowork composer ---------- */
.cw-composer-wrap {
  position:sticky;bottom:0;
  background:linear-gradient(180deg, transparent 0%, var(--bg-main) 22%);
  padding:24px 0 20px;
  margin-top:24px;
}
.cw-starter-chips {
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;
}
.cw-starter-chip {
  display:inline-flex;align-items:center;gap:8px;
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  color:var(--text-2);font-size:12.5px;font-family:inherit;
  padding:7px 12px;border-radius:999px;cursor:pointer;
  transition:background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.cw-starter-chip:hover {
  background:var(--bg-elev-2);color:var(--text);border-color:var(--text-4);
}
.cw-starter-chip-arrow { color:var(--accent);font-weight:600; }
.cw-pending-note {
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--accent);
  margin-bottom:8px;padding:5px 10px;
  background:rgba(217,119,87,0.08);border-radius:6px;
}
.cw-composer-nudge {
  font-size:12px;color:var(--text-3);margin-bottom:8px;text-align:center;
}
.cw-composer {
  background:var(--bg-input);border:1px solid var(--border-strong);
  border-radius:14px;padding:12px 14px;
  transition:border-color 150ms ease;
}
.cw-composer:focus-within { border-color:rgba(217,119,87,0.4); }
.cw-composer.is-locked { opacity:0.5;background:var(--bg-elev-1); }
.cw-composer-textarea {
  width:100%;background:transparent;border:none;outline:none;resize:none;
  color:var(--text);font-family:inherit;font-size:14px;line-height:1.5;
  padding:4px 0;margin-bottom:6px;
}
.cw-composer-textarea::placeholder { color:var(--text-4); }
.cw-composer-row { display:flex;align-items:center;justify-content:space-between;gap:8px; }
.cw-composer-tools { display:flex;align-items:center;gap:2px; }
.cw-composer-send {
  width:30px;height:30px;border-radius:8px;
  background:var(--accent);border:none;color:#1f1e1c;cursor:pointer;
  display:flex;align-items:center;justify-content:center;margin-left:4px;
  transition:background 120ms ease;
}
.cw-composer-send:hover:not(:disabled) { background:var(--accent-2); }
.cw-composer-send:disabled { background:rgba(217,119,87,0.25);cursor:not-allowed;color:rgba(31,30,28,0.5); }

/* ---------- v2: upgrade slide-up ---------- */
.cw-upgrade-card {
  background:linear-gradient(135deg, rgba(217,119,87,0.12), rgba(217,119,87,0.04));
  border:1px solid rgba(217,119,87,0.45);
  border-radius:14px;
  padding:18px 20px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  animation:cwSlideUp 360ms cubic-bezier(0.2, 0.8, 0.3, 1);
}
@keyframes cwSlideUp {
  from { opacity:0;transform:translateY(20px); }
  to   { opacity:1;transform:translateY(0); }
}
.cw-upgrade-card-body { flex:1;min-width:0; }
.cw-upgrade-card-title { font-family:var(--font-serif);font-size:20px;font-weight:500;color:var(--text);margin-bottom:4px; }
.cw-upgrade-card-sub { font-size:13px;color:var(--text-3);line-height:1.45; }
.cw-upgrade-card-actions { display:flex;align-items:center;gap:8px;flex-shrink:0; }
.cw-upgrade-card-secondary {
  background:transparent;border:none;color:var(--text-3);font-family:inherit;
  font-size:13px;padding:8px 12px;cursor:pointer;border-radius:8px;
}
.cw-upgrade-card-secondary:hover { color:var(--text);background:rgba(255,255,255,0.04); }
.cw-upgrade-card-primary {
  background:var(--accent);color:#1f1e1c;font-weight:600;font-size:13px;
  border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:inherit;
  transition:background 120ms ease;
}
.cw-upgrade-card-primary:hover { background:var(--accent-2); }

/* ---------- v2: chat extras (attachment, suggested-reply, rich content, handoff) ---------- */
.chat-attachment {
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(217,119,87,0.10);border:1px solid rgba(217,119,87,0.30);
  padding:6px 10px;border-radius:8px;margin-bottom:10px;
}
.chat-attachment-icon { display:flex;align-items:center; }
.chat-attachment-body { display:flex;flex-direction:column;gap:1px; }
.chat-attachment-name { font-size:12.5px;font-weight:500;color:var(--text); }
.chat-attachment-meta { font-size:11px;color:var(--text-3); }
.chat-rich p { margin:0 0 12px; line-height:1.55; color:var(--text-2); }
.chat-rich p:last-child { margin-bottom:0; }
.chat-rich-h { font-weight:600;color:var(--text);margin-top:4px; }
.chat-rich-list { margin:0 0 14px;padding-left:22px;color:var(--text-2);line-height:1.6; }
.chat-rich-list li { margin-bottom:3px; }
.chat-rich-pre {
  font-family:var(--font-mono);font-size:12.5px;line-height:1.6;
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  padding:14px 16px;border-radius:10px;color:var(--text-2);
  white-space:pre;overflow-x:auto;margin:0 0 14px;
}
.chat-suggested-replies {
  display:flex;flex-wrap:wrap;gap:8px;margin-left:38px;margin-top:-8px;
}
.chat-suggested-reply {
  background:rgba(217,119,87,0.08);
  border:1px solid rgba(217,119,87,0.4);
  color:var(--accent);font-family:inherit;font-size:13px;font-weight:500;
  padding:7px 14px;border-radius:999px;cursor:pointer;
  transition:background 120ms ease, border-color 120ms ease;
}
.chat-suggested-reply:hover {
  background:rgba(217,119,87,0.16);
  border-color:rgba(217,119,87,0.65);
}
.chat-handoff {
  margin-top:18px;
  background:linear-gradient(135deg, rgba(217,119,87,0.10), rgba(217,119,87,0.02));
  border:1px solid rgba(217,119,87,0.4);
  border-radius:12px;padding:16px 18px;
}
.chat-handoff-head { display:flex;gap:12px;margin-bottom:14px; }
.chat-handoff-icon {
  width:32px;height:32px;flex-shrink:0;
  background:rgba(217,119,87,0.14);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.chat-handoff-titles { flex:1; }
.chat-handoff-title { font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px; }
.chat-handoff-sub { font-size:13px;color:var(--text-3);line-height:1.5; }
.chat-handoff-foot { display:flex;align-items:center;gap:14px;flex-wrap:wrap; }
.chat-handoff-cta {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);color:#1f1e1c;border:none;font-family:inherit;
  font-size:13px;font-weight:600;padding:9px 16px;border-radius:8px;cursor:pointer;
  transition:background 120ms ease;
}
.chat-handoff-cta:hover { background:var(--accent-2); }
.chat-handoff-meta { font-size:12px;color:var(--text-3); }

/* ---------- v2: cw-tab section visual cleanup ---------- */
.cw-tab-section h2 {
  font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-3);font-weight:600;
}

/* ---------- v4: cowork landing card ---------- */
.cw-tab-empty {
  position:relative;
  padding:24px 32px 64px;
  max-width:none;
}
.cw-tab-quota-floater {
  display:flex;justify-content:flex-end;
  margin-bottom:14px;
}
.cw-tab-quota-floater .cw-tab-quota {
  background:rgba(217,119,87,0.06);
  border:1px solid rgba(217,119,87,0.25);
  border-radius:10px;padding:8px 14px;
  min-width:0;
  display:flex;flex-direction:row;align-items:center;gap:10px;
}
.cw-tab-quota-floater .cw-tab-quota-num { display:flex;align-items:baseline; }
.cw-tab-quota-floater .cw-tab-quota-used { font-size:18px;font-weight:600; }
.cw-tab-quota-floater .cw-tab-quota-total { font-size:13px; }
.cw-tab-quota-floater .cw-tab-quota-label { font-size:10px;margin:0; }
.cw-tab-quota-floater .cw-tab-quota-bar { display:none; }
.cw-tab-quota-floater .cw-tab-upgrade-link { font-size:11px;margin-left:4px; }
.cw-card-section-head { margin-top:0;margin-bottom:12px; }
.cw-card {
  background:rgba(255,255,255,0.015);
  border:1px solid var(--border-strong);
  border-radius:16px;
  padding:24px 28px 20px;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
  background-size:18px 18px;
}
.cw-hero-headline {
  display:flex;align-items:center;gap:14px;margin-bottom:6px;
}
.cw-hero-mark {
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:rgba(217,119,87,0.16);
  border:1px solid rgba(217,119,87,0.3);
  color:var(--accent);font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--font-serif);
}
.cw-hero-h1 {
  font-family:var(--font-serif);
  font-size:30px;font-weight:500;letter-spacing:-0.01em;
  color:var(--text);line-height:1.15;
}
.cw-hero-link {
  font-size:13px;color:var(--text-3);text-decoration:underline;
  text-decoration-color:rgba(233,231,224,0.30);
  text-underline-offset:3px;
  margin-left:46px;margin-bottom:18px;display:inline-block;
}
.cw-hero-link:hover { color:var(--text-2);text-decoration-color:var(--text-3); }
.cw-hero-composer { width:100%; }
.cw-composer-wrap.is-hero {
  position:static;background:none;padding:0;margin-top:0;
}
.cw-composer.is-hero {
  border-radius:14px;padding:14px 16px;
  background:var(--bg-input);
  border-color:var(--border-strong);
}
.cw-composer.is-hero .cw-composer-textarea {
  font-size:14.5px;padding:6px 0 14px;min-height:52px;
}
.cw-composer.is-hero .cw-composer-textarea::placeholder { color:var(--text-3); }
.cw-composer.is-hero .cw-composer-row { gap:4px;flex-wrap:nowrap; }
.cw-composer.is-hero .cw-composer-tools { gap:0;flex-shrink:1;min-width:0;flex-wrap:nowrap; }
.cw-composer.is-hero .cw-composer-tools .composer-tool {
  padding:4px 8px;font-size:12px;white-space:nowrap;
}
.cw-composer.is-hero .cw-composer-tools .composer-tool span { white-space:nowrap; }

/* chips inside the card, below composer */
.cw-card-chips {
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:16px;
}
.cw-card-chip {
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  color:var(--text-2);font-size:12.5px;font-family:inherit;
  padding:7px 13px;border-radius:999px;cursor:pointer;
  transition:background 120ms ease, color 120ms ease, border-color 120ms ease;
}
.cw-card-chip:hover {
  background:rgba(255,255,255,0.05);
  color:var(--text);
  border-color:var(--text-4);
}
.cw-card-chip-arrow { color:var(--accent);font-weight:600; }

/* completed tasks below the chat fold */
.cw-history-fold {
  margin-top:64px;
  padding-top:24px;
  border-top:1px solid var(--border);
}
.cw-history-fold .cw-tab-section-head {
  margin-bottom:14px;
}

/* Active task card */
.cw-task {
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  border-radius:12px;overflow:hidden;
}
.cw-task-head {
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.cw-task-head-l { display:flex;align-items:center;gap:14px; }
.cw-task-status {
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--green);
  padding:3px 8px 3px 7px;border-radius:5px;
  background:rgba(127,200,154,0.10);
  border:1px solid rgba(127,200,154,0.22);
}
.cw-task-pulse {
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 0 rgba(127,200,154,0.6);
  animation:pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow:0 0 0 0 rgba(127,200,154,0.6); }
  70% { box-shadow:0 0 0 6px rgba(127,200,154,0); }
  100% { box-shadow:0 0 0 0 rgba(127,200,154,0); }
}
.cw-task-name { font-size:15px;font-weight:600; }
.cw-task-id {
  font-family:var(--font-mono);font-size:11px;
  color:var(--text-4);
  padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);
}
.cw-task-head-r { display:flex;gap:4px; }
.cw-task-icon-btn {
  width:28px;height:28px;border-radius:6px;
  background:none;border:0;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.cw-task-icon-btn:hover { background:rgba(255,255,255,0.06);color:var(--text); }

.cw-task-meta {
  display:grid;grid-template-columns:repeat(4, 1fr);gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
}
.cw-task-meta-item { background:var(--bg-elev-1);padding:14px 18px; }
.cw-task-meta-label {
  font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-4);font-weight:500;margin-bottom:6px;
}
.cw-task-meta-val { font-size:13px;color:var(--text); }
.cw-task-meta-srcs { display:flex;gap:4px;flex-wrap:wrap; }

.cw-task-tabs {
  display:flex;gap:2px;
  padding:8px 12px 0;
  border-bottom:1px solid var(--border);
}
.cw-task-tab {
  padding:8px 14px 10px;
  background:none;border:0;border-bottom:2px solid transparent;
  color:var(--text-3);font:inherit;font-size:12.5px;font-weight:500;cursor:default;
  margin-bottom:-1px;
}
.cw-task-tab:hover { color:var(--text); }
.cw-task-tab.is-on { color:var(--text);border-bottom-color:var(--accent); }

/* Test run */
.cw-test { padding:18px; }
.cw-test-head {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.cw-test-success {
  display:inline-flex;align-items:center;gap:8px;
  font-size:13px;font-weight:500;color:var(--green);
}
.cw-test-time { font-size:11.5px;color:var(--text-4);font-variant-numeric:tabular-nums; }

.cw-test-trace {
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;
  display:flex;flex-direction:column;gap:7px;
  margin-bottom:18px;
  font-family:var(--font-mono);
}
.cw-trace { display:grid;grid-template-columns:14px 1fr auto;gap:10px;align-items:center; }
.cw-trace-dot {
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid var(--text-4);
  display:flex;align-items:center;justify-content:center;
}
.cw-trace-dot.is-done { background:var(--green);border-color:var(--green);color:#1f1e1c; }
.cw-trace-label { font-size:12px;color:var(--text-2); }
.cw-trace-time { font-size:11px;color:var(--text-4);font-variant-numeric:tabular-nums; }

.cw-test-preview {
  border:1px solid var(--border-strong);
  border-radius:10px;overflow:hidden;
}
.cw-test-preview-head {
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:rgba(255,255,255,0.03);
  border-bottom:1px solid var(--border);
  font-size:11.5px;
}
.cw-test-preview-channel { color:var(--text-2);flex:1;font-family:var(--font-mono);font-size:11px; }
.cw-test-preview-time { color:var(--text-4); }
.cw-test-preview-body { background:#0d0d0d;padding:14px 16px; }

.cw-slack-msg { display:flex;flex-direction:column;gap:4px; }
.cw-slack-msg-head { display:flex;align-items:center;gap:8px; }
.cw-slack-bot { font-weight:700;font-size:14px;color:#e8e6e0; }
.cw-slack-bot-tag {
  font-size:9px;font-weight:700;letter-spacing:0.06em;
  padding:1.5px 4px;border-radius:3px;
  background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.7);
}
.cw-slack-time { font-size:11.5px;color:rgba(255,255,255,0.4); }
.cw-slack-msg-body {
  font-size:13.5px;line-height:1.6;color:#d4d2cc;
  font-family:'Lato', system-ui, sans-serif;
}
.cw-slack-msg-body strong { color:#fff; }
.cw-slack-attach {
  margin-top:10px;font-size:11.5px;color:rgba(255,255,255,0.4);
  padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);
}
.cw-slack-attach a { color:#5b8def;text-decoration:none;cursor:default; }

/* History */
.cw-history { padding:18px; }
.cw-history-row {
  display:grid;grid-template-columns:14px 1fr 1fr auto;gap:14px;
  padding:10px 0;align-items:center;font-size:12.5px;
  border-bottom:1px solid var(--border);
}
.cw-history-row.is-current { background:rgba(217,119,87,0.04);padding:10px 12px;border-radius:6px;border:1px solid var(--accent-border);margin-bottom:8px; }
.cw-history-dot { width:8px;height:8px;border-radius:50%; }
.cw-history-dot.is-success { background:var(--green); }
.cw-history-when { color:var(--text); }
.cw-history-result { color:var(--text-3); }
.cw-history-dur { color:var(--text-4);font-family:var(--font-mono);font-size:11.5px; }
.cw-history-empty {
  text-align:center;padding:32px 16px;color:var(--text-3);font-size:13px;
}
.cw-history-empty strong { color:var(--text); }

/* Prompt */
.cw-prompt { padding:18px; }
.cw-prompt-label { font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;font-weight:500; }
.cw-prompt-pre {
  background:var(--bg-input);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;
  color:var(--text-2);white-space:pre-wrap;margin:0 0 14px;
}
.cw-prompt-edit { display:flex;align-items:center;gap:12px; }
.cw-prompt-edit-btn {
  padding:6px 12px;border-radius:6px;font:inherit;font-size:12px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border-strong);
  color:var(--text);cursor:default;
}
.cw-prompt-edit-hint { font-size:11.5px;color:var(--text-4); }

/* Templates */
.cw-template-grid { display:grid;grid-template-columns:repeat(4, 1fr);gap:10px; }
.cw-template {
  display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  padding:14px;border-radius:10px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  text-align:left;cursor:default;color:var(--text);font:inherit;
  opacity:0.5;
}
.cw-template-icon { font-size:20px;margin-bottom:4px; }
.cw-template-title { font-size:12.5px;font-weight:600; }
.cw-template-sub { font-size:11px;color:var(--text-3);line-height:1.4;flex:1; }
.cw-template-lock { font-size:10.5px;color:var(--text-4);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);width:100%; }

/* Upgrade callout — shown after the free test is spent */
.cw-upgrade {
  position:relative;
  border-radius:14px;
  background:
    radial-gradient(120% 140% at 100% 0%, rgba(217,119,87,0.18), transparent 50%),
    linear-gradient(180deg, rgba(217,119,87,0.10), rgba(217,119,87,0.04));
  border:1px solid var(--accent-border);
  padding:22px 24px;
  overflow:hidden;
}
.cw-upgrade::after {
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(60% 80% at 90% 110%, rgba(217,119,87,0.20), transparent 60%);
  pointer-events:none;
}
.cw-upgrade-row {
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
  position:relative;z-index:1;
  margin-bottom:20px;
}
.cw-upgrade-eyebrow {
  display:inline-flex;align-items:center;gap:7px;
  font-size:10.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--accent);margin-bottom:8px;
}
.cw-upgrade-eyebrow-dot {
  width:6px;height:6px;border-radius:50%;background:var(--accent);
}
.cw-upgrade-title {
  font-family:var(--font-serif);font-weight:500;
  font-size:22px;line-height:1.2;letter-spacing:-0.01em;
  color:var(--text);margin:0 0 6px;
}
.cw-upgrade-sub {
  font-size:13.5px;line-height:1.55;color:var(--text-2);
  margin:0;max-width:480px;
}
.cw-upgrade-cta-col { display:flex;flex-direction:column;align-items:flex-end;gap:6px; }
.cw-upgrade-price {
  font-size:11.5px;color:var(--text-3);
}
.cw-upgrade-price strong { color:var(--text);font-weight:600; }
.cw-upgrade-cta {
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:9px;
  background:var(--accent);color:#fff;border:0;font:inherit;font-size:13.5px;font-weight:600;
  cursor:default;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 24px -6px rgba(217,119,87,0.55);
}
.cw-upgrade-cta:hover { background:#cf6b48; }

.cw-upgrade-examples-label {
  font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-3);font-weight:600;margin-bottom:10px;
  position:relative;z-index:1;
}
.cw-upgrade-examples {
  display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;
  position:relative;z-index:1;
}
.cw-upgrade-ex {
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-strong);
  border-radius:10px;padding:12px 14px;
  display:flex;flex-direction:column;gap:6px;
  text-align:left;color:var(--text);font:inherit;cursor:default;
  transition:background 0.12s, border-color 0.12s, transform 0.12s;
}
.cw-upgrade-ex:hover {
  background:rgba(217,119,87,0.06);border-color:var(--accent-border);
  transform:translateY(-1px);
}
.cw-upgrade-ex-cadence {
  font-family:var(--font-mono);
  font-size:10px;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--accent);font-weight:500;
}
.cw-upgrade-ex-title {
  font-size:13px;font-weight:600;color:var(--text);line-height:1.3;
}
.cw-upgrade-ex-sub {
  font-size:11.5px;color:var(--text-3);line-height:1.45;
}
.cw-upgrade-ex-srcs { display:flex;gap:4px;margin-top:2px; }

.cw-quota-spent-tag {
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--accent);
  padding:3px 8px;border-radius:5px;
  background:rgba(217,119,87,0.10);
  border:1px solid var(--accent-border);
  margin-top:8px;
}

/* Used-task card (locked, free run consumed) */
.cw-used {
  position:relative;
  border-radius:16px;overflow:hidden;
  background:#161513;
  border:1px solid var(--border-strong);
}
.cw-used-bar {
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:linear-gradient(90deg, rgba(217,119,87,0.16), rgba(217,119,87,0.06));
  border-bottom:1px solid var(--accent-border);
  font-size:12px;color:var(--accent);
  font-weight:600;letter-spacing:0.04em;
}
.cw-used-bar svg { opacity:0.95; }
.cw-used-bar-spacer { flex:1; }
.cw-used-bar-meta { color:var(--text-3);font-weight:500;letter-spacing:0; }

.cw-used-head {
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:18px 20px 6px;
}
.cw-used-titles { flex:1;min-width:0; }
.cw-used-eyebrow {
  display:inline-flex;align-items:center;gap:7px;
  font-size:10.5px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-3);margin-bottom:6px;
}
.cw-used-eyebrow-dot {
  width:6px;height:6px;border-radius:50%;background:var(--text-4);
}
.cw-used-name {
  font-family:var(--font-serif);font-weight:500;
  font-size:22px;line-height:1.15;letter-spacing:-0.01em;
  color:var(--text);margin:0 0 4px;
}
.cw-used-id {
  font-family:var(--font-mono);font-size:11px;color:var(--text-4);
  padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);
  display:inline-block;
}

.cw-used-prompt {
  position:relative;
  margin:14px 20px 18px;
  border-radius:12px;
  background:#1f1e1c;border:1px solid var(--border-strong);
  padding:16px 18px;
}
.cw-used-prompt-label {
  font-size:10.5px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-3);font-weight:600;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.cw-used-prompt-text {
  font-size:14px;line-height:1.6;color:var(--text);
}
.cw-used-prompt-srcs {
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:14px;padding-top:12px;
  border-top:1px solid var(--border);
  font-size:11.5px;color:var(--text-3);
}
.cw-used-prompt-srcs-label { letter-spacing:0.04em; }
.cw-used-prompt-srcs-list { display:flex;gap:5px;flex-wrap:wrap; }

.cw-used-meta-grid {
  display:grid;grid-template-columns:repeat(3, 1fr);gap:1px;
  background:var(--border);
  border-top:1px solid var(--border);
}
.cw-used-meta-cell { background:#161513;padding:14px 18px; }
.cw-used-meta-label {
  font-size:10px;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--text-4);font-weight:600;margin-bottom:6px;
}
.cw-used-meta-val { font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;flex-wrap:wrap; }
.cw-used-meta-val.is-paused { color:var(--text-3); }
.cw-used-meta-val .src-chip { font-size:10.5px; }
.cw-used-meta-strike { text-decoration:line-through;text-decoration-color:rgba(233,231,224,0.3); }

.cw-used-foot {
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 18px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.18);
}
.cw-used-foot-left {
  display:flex;align-items:center;gap:10px;
  font-size:12.5px;color:var(--text-2);
}
.cw-used-foot-left strong { color:var(--text);font-weight:600; }
.cw-used-foot-cta {
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:8px;
  background:var(--accent);color:#fff;border:0;
  font:inherit;font-size:13px;font-weight:600;cursor:default;
  box-shadow:0 1px 0 rgba(255,255,255,0.18) inset, 0 6px 18px -5px rgba(217,119,87,0.5);
}
.cw-used-foot-cta:hover { background:#cf6b48; }

/* Chat-start card (alternative to manual editor) */
.cw-chat-start {
  position:relative;
  border-radius:16px;
  background:#161513;
  border:1px solid var(--border-strong);
  padding:24px 26px 22px;
  overflow:hidden;
}
.cw-chat-start::before {
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:14px 14px;
  background-position:0 0;
  -webkit-mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), transparent 55%);
          mask-image:linear-gradient(135deg, rgba(0,0,0,0.6), transparent 55%);
  pointer-events:none;
}
.cw-chat-start-head {
  display:flex;align-items:flex-start;gap:14px;
  margin-bottom:18px;position:relative;z-index:1;
}
.cw-chat-start-head .msg-claude-mark {
  width:32px;height:32px;border-radius:8px;
  background:rgba(217,119,87,0.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.cw-chat-start-head .msg-claude-mark svg { width:16px;height:16px; }
.cw-chat-start-headings { flex:1; }
.cw-chat-start-h1 {
  font-family:var(--font-serif);font-weight:500;
  font-size:24px;line-height:1.2;letter-spacing:-0.01em;
  color:var(--text);margin:0 0 4px;
}
.cw-chat-start-msg {
  font-size:13.5px;line-height:1.55;color:var(--text-2);
}
.cw-chat-start-link {
  display:inline-block;font-size:12.5px;color:var(--text-3);
  text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(233,231,224,0.25);
  margin-top:4px;
}

.cw-chat-start-composer {
  position:relative;z-index:1;
  background:#1f1e1c;border:1px solid var(--border-strong);
  border-radius:14px;padding:14px 16px 10px;
}
.cw-chat-start-input {
  font-size:14.5px;color:var(--text-4);
  padding:6px 0 14px;min-height:60px;
  border-bottom:1px dashed transparent;
}
.cw-chat-start-row {
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding-top:6px;
}
.cw-chat-start-tools { display:flex;align-items:center;gap:2px; }
.cw-chat-start-tools .composer-tool {
  font-size:12.5px;color:var(--text-3);
}
.cw-chat-start-send {
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:0;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;cursor:default;
}
.cw-chat-start-send:hover { background:rgba(217,119,87,0.18);color:var(--accent); }

.cw-chat-start-suggestions {
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:14px;position:relative;z-index:1;
}
.cw-chat-start-suggestion {
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 11px 6px 10px;border-radius:999px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--text-2);font:inherit;font-size:12px;cursor:default;
  transition:background 0.12s, color 0.12s, border-color 0.12s;
}
.cw-chat-start-suggestion:hover {
  background:rgba(217,119,87,0.08);color:var(--text);border-color:var(--accent-border);
}
.cw-chat-start-suggestion svg { color:var(--accent);opacity:0.75; }

.cw-or {
  display:flex;align-items:center;gap:14px;
  margin:24px 4px 16px;
  color:var(--text-4);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
}
.cw-or::before, .cw-or::after {
  content:'';flex:1;height:1px;background:var(--border);
}

/* Inline editor inside Cowork tab */
.cw-editor {
  position:relative;
  background:var(--bg-elev-1);border:1px solid var(--border-strong);
  border-radius:12px;overflow:hidden;
}
.cw-editor.is-locked { opacity:0.92; }
.cw-editor-head {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
}
.cw-editor-title {
  font-size:14px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:10px;
}
.cw-editor-state {
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;
}
.cw-editor-state.is-draft { background:rgba(127,200,154,0.10);color:var(--green);border:1px solid rgba(127,200,154,0.22); }
.cw-editor-state.is-locked { background:rgba(217,119,87,0.10);color:var(--accent);border:1px solid var(--accent-border); }
.cw-editor-state.is-locked svg { opacity:0.9; }
.cw-editor-body {
  padding:18px;display:flex;flex-direction:column;gap:14px;
}
.cw-editor-body.is-locked { pointer-events:none;user-select:none; }
.cw-editor-foot {
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 18px;border-top:1px solid var(--border);
  background:rgba(0,0,0,0.12);
}
.cw-editor-foot-left { font-size:11.5px;color:var(--text-3); }
.cw-editor-foot-left strong { color:var(--text-2); }
.cw-editor-foot-actions { display:flex;gap:8px; }

.cw-editor-locked-bar {
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:11px 14px;
  background:linear-gradient(180deg, rgba(217,119,87,0.10), rgba(217,119,87,0.04));
  border-bottom:1px solid var(--accent-border);
}
.cw-editor-locked-bar-text { font-size:12.5px;color:var(--text-2); }
.cw-editor-locked-bar-text strong { color:var(--text); }
.cw-editor-locked-bar-cta {
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:7px;
  background:var(--accent);color:#fff;border:0;
  font:inherit;font-size:12px;font-weight:600;cursor:default;
  box-shadow:0 1px 0 rgba(255,255,255,0.15) inset;
}
.cw-editor-locked-bar-cta:hover { background:#cf6b48; }

/* Confirmation toast */
.confirm-toast {
